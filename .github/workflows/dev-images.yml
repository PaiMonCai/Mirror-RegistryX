name: Dev Images

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Dev image tag to publish
        required: false
        default: dev
      ref_label:
        description: Local ref label shown in the workflow summary
        required: false
        default: dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: paimoncai

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mirror-registryx-panel
            dockerfile: panel/Dockerfile
          - image: mirror-registryx-sync
            dockerfile: sync/Dockerfile

    steps:
      - name: Select image tag
        id: dev_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "image_tag=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.image_tag }}" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout dev source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'dev' || github.ref }}

      - name: Write build summary
        shell: bash
        run: |
          {
            echo "### Dev image build"
            echo ""
            echo "- Ref: ${{ inputs.ref_label || github.ref_name }}"
            echo "- Tag: ${{ steps.dev_tag.outputs.image_tag }}"
            echo "- Image: ${{ matrix.image }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.dev_tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:dev-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
