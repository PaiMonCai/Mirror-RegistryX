name: Release Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: paimoncai

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is released from main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: panel/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix panel ci --include=dev

      - name: Typecheck frontend
        run: npm --prefix panel run typecheck

      - name: Build frontend
        run: npm run build

      - name: Run project verifier
        run: python scripts/verify.py

      - name: Run tests
        run: python -m pytest -q

      - name: Validate compose files
        run: |
          docker compose config
          docker compose -f docker-compose.dev.yml config

  build:
    name: Build ${{ matrix.image }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mirror-registryx-panel
            dockerfile: panel/Dockerfile
          - image: mirror-registryx-sync
            dockerfile: sync/Dockerfile
          - image: mirror-registryx-ops-agent
            dockerfile: ops-agent/Dockerfile

    steps:
      - name: Checkout release source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
